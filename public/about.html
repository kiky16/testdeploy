<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #1f2328;
        color: white;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .top-line {
        height: 4px;
        background-color: #0d6efd;
      }

      .about-section {
        flex: 1;
        padding-top: 20px;
      }

      .about-box {
        text-align: center;
        max-width: 700px;
        margin: 0 auto;
      }

      .about-box h1 {
        font-size: 3rem;
        font-weight: 700;
        margin-bottom: 10px;
      }

      .about-box p {
        font-size: 1.5rem;
        line-height: 1.7;
        color: #f1f1f1;
      }

      footer {
        text-align: center;
        padding: 18px 0;
        background-color: #1b1f23;
        color: #fff;
        font-size: 1.1rem;
      }

      @media (max-width: 768px) {
        .about-box h1 {
          font-size: 2.2rem;
        }

        .about-box p {
          font-size: 1.1rem;
          padding: 0 15px;
        }
      }
    </style>
  </head>
  <body>
    <div class="top-line"></div>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
      <div class="container">
        <a class="navbar-brand fw-bold" href="#">BunnyShop</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-4">
            <li class="nav-item">
              <a class="nav-link active" href="#">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">About</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <section class="about-section">
      <div class="container">
        <div class="about-box">
          <h1>About</h1>
          <p>
            Website ini akan menampilkan daftar produk dan detil produk dengan
            menggunakan routing sederhana. Routing memungkinkan link website
            lebih mudah diingat dan diakses oleh pengguna.
          </p>
        </div>
      </div>
    </section>

    <footer>Copyright &copy; Bunny Web 2021</footer>
  </body>
</html>
