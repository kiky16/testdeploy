<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BunnyShop</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #f8f9fa;
      }

      .navbar-custom {
        background-color: #212529;
        border-top: 3px solid #0d6efd;
      }

      .hero-section {
        min-height: 80vh;
        padding: 100px 0;
      }

      .section-title {
        font-size: 3rem;
        font-weight: 700;
        margin-bottom: 50px;
      }

      .product-card {
        border: 1px solid #ddd;
        background: #fff;
        transition: 0.3s;
      }

      .product-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
      }

      .product-image {
        height: 250px;
        background-color: #e9ecef;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #999;
        font-size: 2rem;
      }

      .stars {
        color: #ffc107;
        font-size: 1.1rem;
        margin-bottom: 10px;
      }

      .old-price {
        text-decoration: line-through;
        color: #6c757d;
        margin-right: 6px;
      }

      footer {
        background-color: #212529;
        color: white;
        text-align: center;
        padding: 20px 0;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
      <div class="container">
        <a onclick="href= '/'" class="navbar-brand fw-bold" href="#">BunnyShop</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-4">
            <li class="nav-item">
              <a class="nav-link active" href="#">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">About</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <section class="hero-section">
      <div class="container">
        <h1 class="section-title">Products</h1>

        <div class="row justify-content-center g-4">
          <div class="col-md-4 col-lg-3">
            <div class="card product-card text-center">
              <div class="product-image">450 x 300</div>
              <div class="card-body py-4">
                <h3 class="h4 fw-bold">Special Item</h3>
                <div class="stars">★★★★★</div>
                <p class="mb-4"><span class="old-price">$20.00</span>$18.00</p>
                <a href="#" class="btn btn-outline-dark">Add to cart</a>
              </div>
            </div>
          </div>

          <div class="col-md-4 col-lg-3">
            <div class="card product-card text-center">
              <div class="product-image">450 x 300</div>
              <div class="card-body py-4">
                <h3 class="h4 fw-bold">Popular Item</h3>
                <div class="stars">★★★★★</div>
                <p class="mb-4">$40.00</p>
                <a href="#" class="btn btn-outline-dark">Add to cart</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <footer>
      <div class="container">
        <p class="mb-0">Copyright © Bunny Web 2021</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
